name: Helm Publish Job

on:
  workflow_call:
    inputs:
      short-sha:
        required: true
        type: string
        description: "Short git SHA for chart version suffix"

env:
  REGISTRY: hmctspublic.azurecr.io

jobs:
  publish:
    name: Publish Umbrella Chart
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Login to Helm OCI registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | \
            helm registry login ${{ env.REGISTRY }} \
              --username "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Add Bitnami repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Build subchart dependencies
        run: |
          for chart_dir in apps/*/helm; do
            echo "Updating dependencies for ${chart_dir}"
            helm dependency update "${chart_dir}"
          done

      - name: Build umbrella chart dependencies
        run: helm dependency update helm/expressjs-monorepo-template

      - name: Package and push charts
        run: |
          mkdir -p ./dist

          # Publish individual subcharts (used by Flux GitOps)
          for chart_dir in apps/*/helm; do
            CHART_NAME=$(grep '^name:' "${chart_dir}/Chart.yaml" | awk '{print $2}')
            BASE_VERSION=$(grep '^version:' "${chart_dir}/Chart.yaml" | awk '{print $2}')
            CHART_VERSION="${BASE_VERSION}-${{ inputs.short-sha }}"

            helm package "${chart_dir}" --version "${CHART_VERSION}" -d ./dist

            CHART_REF="oci://${{ env.REGISTRY }}/helm/${CHART_NAME}"
            if helm show chart "${CHART_REF}" --version "${CHART_VERSION}" > /dev/null 2>&1; then
              echo "Chart ${CHART_NAME}:${CHART_VERSION} already exists, skipping"
            else
              helm push "./dist/${CHART_NAME}-${CHART_VERSION}.tgz" "oci://${{ env.REGISTRY }}/helm"
              echo "Published ${CHART_NAME}:${CHART_VERSION}"
            fi
          done

          # Publish umbrella chart (used by CI pipeline helm deploy)
          BASE_VERSION=$(grep '^version:' helm/expressjs-monorepo-template/Chart.yaml | awk '{print $2}')
          CHART_VERSION="${BASE_VERSION}-${{ inputs.short-sha }}"
          echo "CHART_VERSION=${CHART_VERSION}" >> "$GITHUB_ENV"

          helm package helm/expressjs-monorepo-template --version "${CHART_VERSION}" -d ./dist

          CHART_REF="oci://${{ env.REGISTRY }}/helm/expressjs-monorepo-template"
          if helm show chart "${CHART_REF}" --version "${CHART_VERSION}" > /dev/null 2>&1; then
            echo "Chart expressjs-monorepo-template:${CHART_VERSION} already exists, skipping"
          else
            helm push "./dist/expressjs-monorepo-template-${CHART_VERSION}.tgz" "oci://${{ env.REGISTRY }}/helm"
            echo "Published expressjs-monorepo-template:${CHART_VERSION}"
          fi

      - name: Output publish summary
        run: |
          echo "### Helm Chart Publish Summary :package:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Charts published to** \`oci://${{ env.REGISTRY }}/helm\` **version** \`${CHART_VERSION}\`:" >> $GITHUB_STEP_SUMMARY
          for chart_dir in apps/*/helm; do
            CHART_NAME=$(grep '^name:' "${chart_dir}/Chart.yaml" | awk '{print $2}')
            echo "- \`${CHART_NAME}\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "- \`expressjs-monorepo-template\` (umbrella)" >> $GITHUB_STEP_SUMMARY
